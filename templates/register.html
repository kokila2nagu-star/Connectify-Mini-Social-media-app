{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Connectify Register</title>

<link rel="stylesheet" href="{% static 'style.css' %}">

</head>


<body class="auth-body">


<div class="auth-wrapper">


<div class="auth-card">


<h1>
✨ Connectify
</h1>


<h2>
Create Account
</h2>



<form method="POST">

{% csrf_token %}



<input 
type="text"
name="username"
placeholder="Username"
required>



<input 
type="email"
name="email"
placeholder="Email"
required>



<input 
type="password"
name="password"
placeholder="Password"
required>



<button type="submit">

Register 🚀

</button>



</form>


<p>

Already have an account?

<a href="{% url 'login' %}">
Login
</a>

</p>


</div>


</div>


</body>

</html>
