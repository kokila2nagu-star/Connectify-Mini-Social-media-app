{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Connectify Login</title>

<link rel="stylesheet" href="{% static 'style.css' %}">

</head>


<body class="auth-body">


<div class="auth-wrapper">


<div class="auth-card">


<h1>
✨ Connectify
</h1>


<h2>
Welcome Back
</h2>


<form method="POST">

{% csrf_token %}


<input 
type="text"
name="username"
placeholder="Username"
required>


<input 
type="password"
name="password"
placeholder="Password"
required>



<button type="submit">
Login 🚀
</button>


</form>



<p>
Don't have an account?
<a href="{% url 'register' %}">
Register
</a>
</p>


</div>


</div>



</body>

</html>
